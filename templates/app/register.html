{% extends "base.html" %}

{% block content %}
<h4>S'enregistrer</h4>
<form method="post" action="/register">
    {% csrf_token %}
    <label for="username">username</label>
    <input type="text" name="username" id="username" placeholder="Enternyour username" required>
    <br><br>
    <label for="firstname">firstname</label>
    <input type="text" name="firstname" id="firstname" placeholder="Enter your firstname" required>
    <br><br>
    <label for="lastname">lastname</label>
    <input type="text" name="lastname" id="lastname" placeholder="Enter your lastname" required>
    <br><br>
    <label for="email">email</label>
    <input type="email" name="email" id="email" placeholder="Enter your email" required>
    <br><br>
    <label for="password">password</label>
    <input type="password" name="password" id="password" placeholder="Enter your password" required>
    <br><br>
    <label for="password1">password1</label>
    <input type="password" name="password1" id="password1" placeholder="Enter your password confirm" required>
    <br><br>
    <button type="submit">Connecter</button>

</form>
        
{% endblock %}
